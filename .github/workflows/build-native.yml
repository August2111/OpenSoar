---
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'cloud/**'
      - 'doc/**'
      - 'fuzzer/**'
      # - 'ide/**'
      - 'kobo/**'
      - 'python/**'
      - '.github/workflows/build-container.yml'
      - '.github/workflows/build-unix.yml'
      - '.readthedocs.yaml'
    branches:
      - master
      - dev-branch
    tags:
      - 'v*'

  pull_request:
    paths-ignore:
      - 'cloud/**'
      - 'doc/**'
      - 'fuzzer/**'
      # - 'ide/**'
      - 'kobo/**'
      - 'python/**'
      - '.github/workflows/build-container.yml'
      - '.github/workflows/build-unix.yml'
      - '.readthedocs.yaml'
    branches:
      - master
      # - dev-branch

env:
  DEBUG: y
  BOOST: boost_1_85_0
  BUILD: UNIX,WIN64,PC
  TEST: UNIX,KOBO

jobs:
  release:
    name: "Create Release"
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Parse changelog
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=$(echo "${{ github.ref }}" | cut -f3 -d '/')
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo 'CHANGELOGENTRY<<EOF' >> $GITHUB_ENV
          ./tools/changelog.sh "$TAG" >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV
          case "$TAG" in
            *-rc*)
              echo "PRERELEASE=true" >> $GITHUB_ENV
              ;;
            *)
              echo "PRERELEASE=false" >> $GITHUB_ENV
              ;;
          esac
        id: changelogentry

      - name: Create release
        id: create_release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/create-release@v1.1.4
        # uses: ncipollo/release-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          allowUpdates: true
          name: Version ${{ github.ref_name }}
          body: ${{ env.CHANGELOGENTRY }}
          prerelease: ${{ env.PRERELEASE }}

      - name: Get OpenSoar Version
        id: get_version
        run: |
          echo "Get OpenSoar Version"
          echo "CurrDir = $(pwd)"
          # include OpenSoar.config
          # VERSION=$PROGRAM_VERSION
          VERSION=7.43.22.1
          # VERSION=$(cat VERSION.txt)
          echo "$VERSION"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "GITHUB_SHA = $GITHUB_SHA"
          GITHUB_HASH=$(git rev-parse --short $GITHUB_SHA)
          echo "GITHUB_HASH = $GITHUB_HASH"
          echo "GITHUB_HASH = $(git rev-parse --short $GITHUB_SHA)"
          echo "PRERELEASE = $PRERELEASE"
          echo "GITHUB_ENV = $GITHUB_ENV"
          echo "PRERELEASE = ${{ env.PRERELEASE }}"
          echo "git_hash=$(git rev-parse --short $GITHUB_SHA)" >> $GITHUB_ENV
          echo "git_hash=$GITHUB_HASH" >> $GITHUB_ENV
          echo "git_hash = ${{ env.git_hash }}"
          echo "git_hash = $git_hash"
          if [ -z ${{ env.git_hash }} ]; then
            echo "git_hash=$(git rev-parse --short --verify HEAD )" >> $GITHUB_ENV
            echo "env.git_hash = '${{ env.git_hash }}'"
          fi 

  build:
    runs-on: ${{ matrix.os }}
    needs: release
    # if: contains('UNIX,WIN64' , ${{ matrix.target }})
    container: ${{ matrix.target_container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: ANDROIDAARCH64
            target_bin: OpenSoar
            target_bin_path: bin
            target_final: OpenSoar
            target_ext: .apk
            target_test: true
            target_upload: true
            upload_artifact: false
            ndk: r26d
            target_container: debian:bookworm-slim
          
          - os: ubuntu-24.04
            target: ANDROID
            target_bin: OpenSoar
            target_bin_path: bin
            target_final: OpenSoar
            target_ext: .apk
            target_test: false
            target_upload: true
            upload_artifact: true
            ndk: r26d
            target_container: debian:bookworm-slim
            # ------------------------------------------------------
          - os: ubuntu-24.04
            target: UNIX
            target_bin: OpenSoar_${{ needs.release.outputs.version }}_amd64
            target_bin_path: bin
            target_final: OpenSoar_
            target_ext: .deb
            target_test: true
            target_upload: true
            upload_artifact: false
            target_container: debian:bookworm-slim
          
          #### needs long time.. - os: ubuntu-24.04
          #### needs long time..   target: KOBO
          #### needs long time..   target_bin: KoboRoot
          #### needs long time..   target_bin_path: bin
          #### needs long time..   target_final: KoboRoot
          #### needs long time..   target_ext: .tgz
          #### needs long time..   target_upload: true
          #### needs long time..   upload_artifact: false
          #### needs long time..   target_container: debian:bookworm-slim
          
          - os: ubuntu-24.04
            target: WIN64
            target_bin: OpenSoar
            target_bin_path: bin
            target_final: OpenSoar
            target_ext: .exe
            target_test: true
            target_upload: true
            upload_artifact: true
            target_container: debian:bookworm-slim
          
          - os: ubuntu-24.04
            target: PC
            target_bin: OpenSoar
            target_bin_path: bin
            target_final: OpenSoar
            target_ext: .exe
            target_test: true
            target_upload: true
            upload_artifact: false
            target_container: debian:bookworm-slim
          
          - os: macos-12
            target: OSX64
            target_bin: OpenSoar
            target_bin_path: bin
            target_final: OpenSoar
            target_ext: ''
            target_test: false
            target_upload: false
            upload_artifact: true
            target_container: ''
          
          - os: macos-14
            target: MACOS
            target_bin: OpenSoar
            target_bin_path: bin
            target_final: OpenSoar
            target_ext: ''
            target_test: true
            target_upload: false
            upload_artifact: false
            target_container: ''
          
          - os: macos-14
            target: IOS64
            target_bin: OpenSoar
            target_bin_path: bin
            target_final: OpenSoar
            target_ext: ''
            target_test: false
            target_upload: false
            upload_artifact: false
            target_container: ''
  
    steps:
      - name: Check Git Variables
        run: |
          echo "(No) Check Git variables"
          COMMIT=$(echo $GITHUB_SHA | head -c 7)
          echo "GIT_COMMIT=$COMMIT" >> $GITHUB_ENV
          ### echo "CurrDir = $(pwd)"
          ### echo "GITHUB_ENV = $GITHUB_ENV"
          ### echo "cat $GITHUB_ENV"
          ### echo "github.workspace = ${{ github.workspace }}"
          ### echo "GITHUB_WORKSPACE = $GITHUB_WORKSPACE"
          ### echo "GITHUB_HASH = $GITHUB_HASH"
          ### if [ -z '${{ env.git_hash }}' ]; then
          ###   echo "git_hash isn't set!!!"
          ###   git_hash=$(git rev-parse --short "$GITHUB_SHA")
          ###   echo 'git_hash = $(git rev-parse --short "$GITHUB_SHA")' >> $GITHUB_ENV
          ###   echo "git_hash = ${{ env.git_hash }}"
          ### else
          ###   echo "git_hash = ${{ env.git_hash }}"
          ###   echo "git_hash = $git_hash"
          ### fi
        
      - name: Install checkout dependencies
        if: ${{ startsWith(matrix.os, 'ubuntu-') }}
        run: |
          echo "Install checkout dependencies: ${{ matrix.target }} "
          apt-get update
          apt-get install -y --no-install-recommends git \
            ca-certificates rsync openssh-client
  
      - name: Set vars for release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "Set vars for release: ${{ matrix.target }} "
          if [ ${{ secrets.TEST }} = '123456' ]; then
            echo "secrets detected"
          else 
            echo "secrets NOT detected"
          fi
          
          if [ ${{ startsWith(github.ref, 'refs/tags/v') }} = true ]; then
            echo "DEBUG=n" >> $GITHUB_ENV
            if [ ${{ matrix.target_final }} = "OpenSoar" ]; then
              echo "TARGET_FINAL=${{ matrix.target_final }}" >> $GITHUB_ENV
            fi
          elif [ ${{ matrix.target }} = 'WIN64' ]; then
            # August2111: with WIN64 don't use the Debug option
            echo "no DEBUG flag"
            echo "DEBUG=n" >> $GITHUB_ENV
          fi
  
      - name: Checkout code
        # if: 
        uses: actions/checkout@v4
        with:
          submodules: true
  
      - name: Cache ccache
        # if: 
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.target }}-ccache
  
      - name: "Cache Boost"
        # if: 
        uses: actions/cache@v4
        with:
          key: ${{ env.BOOST }}-${{ hashFiles('lib/boost/patches/**') }}
          path: |
            ${{ github.workspace }}/output/download/${{ env.BOOST }}.tar.bz2
            ${{ github.workspace }}/output/src/stamp-${{ env.BOOST }}
            ${{ github.workspace }}/output/src/${{ env.BOOST }}/boost
  
      - name: Install dependencies
        # if: 
        run: |
          echo "Install dependencies: ${{ matrix.target }}"
          echo "CurrDir = $(pwd)"
          git config --global --add safe.directory $GITHUB_WORKSPACE # ${{ github.workspace }}
          echo "GITHUB_WORKING: ${{ matrix.target }}"
          echo "github.workspace = ${{ github.workspace }}"
          echo "GITHUB_WORKSPACE = $GITHUB_WORKSPACE"
          echo "GITHUB_SHA       = $GITHUB_SHA"
          echo "GITHUB_HASH      = $GITHUB_HASH"
          echo "GIT_COMMIT       = $GIT_COMMIT"
          ### git_hash=$(git rev-parse --short "$GITHUB_SHA")
          ### echo 'git_hash = $(git rev-parse --short "$GITHUB_SHA")' >> $GITHUB_ENV
          ### # echo "git_hash=$(git rev-parse --short $GITHUB_SHA)" >> $GITHUB_ENV
          ### echo "GITHUB_WORKSPACE = $GITHUB_WORKSPACE"
          ### if [ ${{ startsWith(matrix.os, 'ubuntu-') }} ]; then
          ###   dir
          ###   #source OpenSoar.config
          ###   . ./OpenSoar.config
          ###   VERSION=$PROGRAM_VERSION
          ###   if [ -z ${{ env.git_hash }} ]; then
          ###     echo "git_hash='.git.'" >> $GITHUB_ENV
          ###   fi
          ### fi
          ### echo "env.git_hash = '${{ env.git_hash }}'"
  
          if [ ${{ startsWith(matrix.os, 'ubuntu-') }} = true ]; then
            ./ide/provisioning/install-debian-packages.sh UPDATE BASE LINUX
            case ${{ matrix.target }} in
              ANDROID | ANDROIDFAT | ANDROIDAARCH64)
                ./ide/provisioning/install-debian-packages.sh ARM LLVM ANDROID
                ./ide/provisioning/install-android-tools.sh NDK SDK
                ;;
              WIN64 | WIN32 | PC)
                # echo "git_hash=$(shell git rev-parse --short --verify HEAD )" >> $GITHUB_ENV
                ./ide/provisioning/install-debian-packages.sh WIN
                ;;
              UNIX)
                ./ide/provisioning/install-debian-packages.sh LIBINPUT_GBM DEBIAN
                ;;
              KOBO)
                ./ide/provisioning/install-debian-packages.sh ARM KOBO
                ;;
            esac
            ## unknown section!!!: ./ide/provisioning/install-debian-packages.sh CLEAN
          elif [ ${{ startsWith(matrix.os, 'macos-') }} = true ] ; then
            ./ide/provisioning/install-darwin-packages.sh BASE
            ./ide/provisioning/install-darwin-packages.sh ${{ matrix.target }}            
          fi
  
      - name: Prepare signing key
        shell: bash
        if: ${{ startsWith(matrix.target, 'ANDROID') && startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "Prepare signing key: ${{ matrix.target }}"
          # please use secrets.XCSOAR_UPLOAD_KEY... for secrets.OPENSOAR_UPLOAD_KEY to be
          # compatible with repo XCSoar/XCSoar
          if [ -n "${{ secrets.XCSOAR_UPLOAD_KEY_JKS_BASE64 }}" ]; then
            mkdir -p ~/.android/
            echo "${{ secrets.XCSOAR_UPLOAD_KEY_JKS_BASE64 }}" | base64 -d > ~/.android/signing-key.jks
            md5sum ~/.android/signing-key.jks
          fi
  
      - name: Compile OpenSoar - PR
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "Compile OpenSoar - PR: ${{ matrix.target }}"
            case ${{ matrix.target }} in
              ANDROID | ANDROIDFAT | ANDROIDAARCH64)
                echo "make TARGET= ${{ matrix.target }}..."
                make -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 output/ANDROID/bin/${{ matrix.target_bin }}-debug${{ matrix.target_ext }}
                mv output/ANDROID/bin/${{ matrix.target_bin }}-debug${{ matrix.target_ext }} \
                output/ANDROID/bin/${{ matrix.target_bin }}${{ matrix.target_ext }}
                ;;
              WIN64 | WIN32 | PC | UNIX | KOBO)
                echo "!!!!! make -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 everything"
                make -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 everything
                ;;
              ### KOBO)
              ###   echo "make TARGET = Kobo..."
              ###   make -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 output/${{ matrix.target }}/${{ matrix.target_bin }}${{ matrix.target_ext }}
              ###   ;;
              ### UNIX)
              ###   echo "make TARGET = Unix..."
              ###   mkdir -p output/UNIX/DPKG
              ###   rsync -apt . output/UNIX/DPKG --exclude=output/UNIX/DPKG
              ###   cd output/UNIX/DPKG
              ###   DEB_BUILD_OPTIONS=ccache,noopt dpkg-buildpackage --jobs-force=$(nproc) --no-sign
              ###   ;;
              OSX64 | IOS64 | MACOS)
                if [ ${{ matrix.target_test }} == 'true' ]; then 
                  gmake -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2  OPTIMIZE="-O0" everything
                else
                  gmake -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2  OPTIMIZE="-O0"
                fi
                ;;
            esac
      - name: Test Directory (UNIX)
        if: ${{ startsWith(matrix.target, 'UNIX') }}
        run: |
          # cd output/UNIX/DPKG
          echo "----------------------------------------------------------------"
          if [ -d output/${{ matrix.target }}/${{ matrix.target_bin_path }} ]; then
            echo "ls -l output/DEBIAN-${{ matrix.target }}/${{ matrix.target_bin_path }}"
            echo "=============================================================="
            ls -l output/${{ matrix.target }}/${{ matrix.target_bin_path }}
          else
            echo "dir 'output/${{ matrix.target }}/${{ matrix.target_bin_path }}' doesn't exist"
          fi
          echo "----------------------------------------------------------------"
      - name: Upload Test artifact
        uses: actions/upload-artifact@v4
        if: ${{ matrix.target_test }}
        ## if: ${{ matrix.target_test || startsWith(github.ref, 'refs/tags/v')}}
        with:
          name: Test-${{ env.GIT_COMMIT }}-${{ matrix.target }}
          path: |
            test/README
            output/${{ matrix.target }}/${{ matrix.target_bin_path }}/Test*
            output/${{ matrix.target }}/${{ matrix.target_bin_path }}/test_*
          retention-days: 1
  
  
      - name: Compile OpenSoar - Sanitizer Check
        if: ${{ matrix.target == 'UNIX' && !startsWith(github.ref, 'refs/tags/v') && github.ref == 'refs/heads/master' }}
        run: |
          echo "Unix - Sanitizer Check"
          make -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 everything VFB=y SANITIZE=y DEBUG_GLIBCXX=y
  
      - name: Compile OpenSoar - Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        # if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Compile OpenSoar - Release"
          # please use secrets.XCSOAR_UPLOAD_KEY... for secrets.OPENSOAR_UPLOAD_KEY to be
          # compatible with repo XCSoar/XCSoar
            case ${{ matrix.target }} in
              ANDROID | ANDROIDFAT | ANDROIDAARCH64))
                if [ -n "${{ secrets.XCSOAR_UPLOAD_KEY_JKS_PASSWORD }}" ] && [ -n "${{ secrets.XCSOAR_UPLOAD_KEY_JKS_KEY_ALIAS }}" ]; then
                  ANDROID_KEYSTORE_PASS=${{ secrets.XCSOAR_UPLOAD_KEY_JKS_PASSWORD }} \
                  make -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 \
                  output/ANDROID/bin/${{ matrix.target_bin }}${{ matrix.target_ext }} \
                  ANDROID_KEYSTORE=~/.android/signing-key.jks ANDROID_KEY_ALIAS=${{ secrets.XCSOAR_UPLOAD_KEY_JKS_KEY_ALIAS }}
                else
                  make -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 \
                  output/ANDROID/bin/${{ matrix.target_bin }}${{ matrix.target_ext }}
                fi
                ;;
              WIN64 | WIN32 | PC)
                make -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 everything
                ;;
              KOBO)
                make -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 output/${{ matrix.target }}/${{ matrix.target_bin }}${{ matrix.target_ext }}
                ;;
              UNIX)
                mkdir -p output/UNIX/DPKG
                rsync -apt . output/UNIX/DPKG --exclude=output/UNIX/DPKG
                cd output/UNIX/DPKG
                DEB_BUILD_OPTIONS=ccache dpkg-buildpackage --jobs-force=$(nproc) --no-sign
                cp *.deb ../
                ;;
              OSX64 | IOS64 | MACOS)
                gmake -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 OPTIMIZE="-O0"
                ;;
            esac
  
      - name: Upload Release artifact
        uses: actions/upload-artifact@v4
        if: ${{ (matrix.upload_artifact || startsWith(github.ref, 'refs/tags/v'))}}
        with:
          name: ${{ matrix.target_final }}-${{ env.GIT_COMMIT }}-${{ matrix.target }}${{ matrix.target_ext }}
          # path: output/${{ matrix.target }}/${{ matrix.target_bin_path }}/${{ matrix.target_bin }}${{ matrix.target_ext }}
          path: |
            output/${{ matrix.target }}/${{ matrix.target_bin_path }}/${{ matrix.target_bin }}${{ matrix.target_ext }}
          retention-days: 2
  
      - name: Test Directory (DEBIAN-UNIX)
        if: ${{ startsWith(matrix.target, 'UNIX') }}
        run: |
          ### if [ -d output ]; then
          ###   echo "ls -l output"
          ###   echo "=============================================================="
          ###   ls -l output
          ### else
          ###   echo "dir 'output' doesn't exist"
          ### fi
          ### echo "----------------------------------------------------------------"
          ### if [ -d output/UNIX/DPKG ]; then
          ###   echo "ls -l output/UNIX/DPKG"
          ###   echo "=============================================================="
          ###   ls -l output/UNIX/DPKG
          ### else
          ###   echo "dir 'output/UNIX/DPKG' doesn't exist"
          ### fi
          ### echo "----------------------------------------------------------------"
          ### if [ -d output/UNIX/DPKG/output ]; then
          ###   echo "ls -l output/DPKG/output"
          ###   echo "=============================================================="
          ###   ls -l output/UNIX/DPKG/output
          ### else
          ###   echo "dir 'output/UNIX/DPKG/output' doesn't exist"
          ### fi
          ### echo "----------------------------------------------------------------"
          ### if [ -d output/UNIX/DPKG/output/UNIX/bin ]; then
          ###   echo "ls -l output/DPKG/output/UNIX/bin"
          ###   echo "=============================================================="
          ###   ls -l output/UNIX/DPKG/output/UNIX/bin
          ### else
          ###   echo "dir 'output/UNIX/DPKG/output/UNIX/bin' doesn't exist"
          ### fi
          ### echo "----------------------------------------------------------------"
          ### if [ -d output/UNIX/DPKG/output/DEBIAN-UNIX/bin ]; then
          ###   echo "ls -l output/DPKG/output/DEBIAN-UNIX/bin"
          ###   echo "=============================================================="
          ###   ls -l output/UNIX/DPKG/output/DEBIAN-UNIX/bin
          ### else
          ###   echo "dir 'output/UNIX/DPKG/output/DEBIAN-UNIX/bin' doesn't exist"
          ### fi
          ### echo "----------------------------------------------------------------"
          ### if [ -d output/${{ matrix.target }}/${{ matrix.target_bin_path }} ]; then
          ###   echo "dir output/${{ matrix.target }}/${{ matrix.target_bin_path }}"
          ###   echo "=============================================================="
          ###   dir output/${{ matrix.target }}/${{ matrix.target_bin_path }}
          ### else
          ###   echo "dir 'output/${{ matrix.target }}/${{ matrix.target_bin_path }}' doesn't exist"
          ### fi
          ### echo "----------------------------------------------------------------"
          ### echo "----------------------------------------------------------------"
          ### echo "----------------------------------------------------------------"
          if [ -d output/UNIX/DPKG ]; then 
            cd output/UNIX/DPKG
            TARGET_PATH=output/DEBIAN-${{ matrix.target }}
          else
            TARGET_PATH=output/${{ matrix.target }}
          fi
          echo "----------------------------------------------------------------"
          if [ -d $TARGET_PATH/${{ matrix.target_bin_path }} ]; then
            echo "ls -l $TARGET_PATH/${{ matrix.target_bin_path }}"
            echo "=============================================================="
            ls -l $TARGET_PATH/${{ matrix.target_bin_path }}
          else
            echo "dir '$TARGET_PATH/${{ matrix.target_bin_path }}' doesn't exist"
          fi
          echo "----------------------------------------------------------------"
  
      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        if: ${{ startsWith(github.ref, 'refs/tags/v') && matrix.target_upload == true && needs.release.outputs.upload_url != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: output/${{ matrix.target }}/${{ matrix.target_bin_path }}/${{ matrix.target_bin }}${{ matrix.target_ext }}
          asset_name: ${{ matrix.target_final }}-${{ matrix.target }}${{ matrix.target_ext }}
          asset_content_type: application/zip
  
      - name: Deploy to Download server - testing
        if: ${{ github.repository == 'August2111/OpenSoar' && github.ref == 'refs/heads/master' }}
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.REPOSITORY_SSH_KEY }}
          ARGS: "-rltgoDzvO"
          SOURCE: output/${{ matrix.target }}/${{ matrix.target_bin_path }}/${{ matrix.target_bin }}${{ matrix.target_ext }}
          REMOTE_HOST: ${{ secrets.REPOSITORY_HOST }}
          REMOTE_USER: ${{ secrets.REPOSITORY_SSH_USER }}
          TARGET: ${{ secrets.REPOSITORY_REMOTE_PATH }}/testing/${{ matrix.target }}/
          SCRIPT_BEFORE: mkdir -p ${{ secrets.REPOSITORY_REMOTE_PATH }}/testing/${{ matrix.target }}
  
      - name: Deploy to Download server - release
        if: ${{ github.repository == 'OpenSoaring/OpenSoar' && startsWith(github.ref, 'refs/tags/v') && matrix.target_upload == true }}
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.REPOSITORY_SSH_KEY }}
          ARGS: "-rltgoDzvO"
          SOURCE: output/${{ matrix.target }}/${{ matrix.target_bin_path }}/${{ matrix.target_bin }}${{ matrix.target_ext }}
          REMOTE_HOST: ${{ secrets.REPOSITORY_HOST }}
          REMOTE_USER: ${{ secrets.REPOSITORY_SSH_USER }}
          TARGET: ${{ secrets.REPOSITORY_REMOTE_PATH }}/releases/${{ needs.release.outputs.version }}/${{ matrix.target }}/
          SCRIPT_BEFORE: mkdir -p ${{ secrets.REPOSITORY_REMOTE_PATH }}/releases/${{ needs.release.outputs.version }}/${{ matrix.target }}/

  test:
    # name: Check TestFiles
    runs-on: ${{ matrix.os }}
    # permissions:
    #  contents: write
    # if: ${{ contains(env.TEST , matrix.target) }}
    # if: ${{ contains('UNIX,KOBO' , matrix.target) }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04 # ubuntu-latest
            target: UNIX
          ###- os: ubuntu-22.04
          ###  target: UNIX
          # - os: ubuntu-20.04
          #   target: UNIX
          # - os: ubuntu-18.04
          #   target: UNIX
          - os: macos-14
            target: MACOS
          - os: windows-latest
            target: WIN64
          # - os: windows-latest
          #   target: PC

    needs: build
    # needs: release
    steps:
      - id: checkout
        uses: actions/checkout@v4
      - name: Install checkout dependencies (Ubuntu)
        if: ${{ startsWith(matrix.os, 'ubuntu-') }}
        run: |
          echo "Install checkout dependencies: ${{ matrix.target }} "
          sudo apt-get update
          sudo apt-get install -y libfmt9
      - name: Install checkout dependencies (MacOS)
        if: ${{ startsWith(matrix.os, 'macos-') }}
        run: |
          echo "Install checkout dependencies: ${{ matrix.target }} "
          brew install fmt
      - name: Set Git Variables
        if: ${{ ! startsWith(matrix.os, 'windows-') }}
        run: |
          echo "Set Git Variables"
          COMMIT=$(echo $GITHUB_SHA | head -c 7)
          echo "GIT_COMMIT=$COMMIT" >> $GITHUB_ENV
      - name: Set Git Variables (Windows)
        if: ${{ startsWith(matrix.os, 'windows-') }}
        run: |
          echo "Set Git Variables (Windows)"
          $COMMIT = $env:GITHUB_SHA.substring(0,7)
          echo "GIT_COMMIT=$COMMIT" >> $env:GITHUB_ENV
          echo "========================"
      - name: Fetch Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Test-${{ env.GIT_COMMIT }}-${{ matrix.target }}
          path: ${{ github.workspace }}
      - name: Run Test Programs on ${{ matrix.target }}
        run: |
          echo "Run Test Programs on ${{ matrix.target }}"
          chmod +x ./output/${{ matrix.target }}/bin/*
          echo "run tests on Target '${{ matrix.target }}'"
          make check-no-build TARGET=${{ matrix.target }}
        working-directory: ${{ github.workspace }}
