  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: WIN64
          - os: windows-latest
            target: PC
          - os: ubuntu-
            target: UNIX
          - os: macos-14
            target: MACOS

    needs: build
    steps:
      - id: checkout
        uses: actions/checkout@v4
      - name: Fetch Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Test-${{ matrix.target }}
          path: ${{ github.workspace }}/output/${{ matrix.target }}/bin
      - name: OpenSoar run checks on ${{ matrix.target }}
        run: |
          echo "OpenSoar run checks on ${{ matrix.target }}"
