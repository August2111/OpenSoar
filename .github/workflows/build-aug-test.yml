---
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'cloud/**'
      - 'doc/**'
      - 'fuzzer/**'
      - 'ide/**'
      - 'kobo/**'
      - 'python/**'
      - '.github/workflows/build-container.yml'
      - '.github/workflows/build-unix.yml'
      - '.readthedocs.yaml'
    branches:
      - master
      - dev-branch
    tags:
      - 'v*'

  pull_request:
    paths-ignore:
      - 'cloud/**'
      - 'doc/**'
      - 'fuzzer/**'
      - 'ide/**'
      - 'kobo/**'
      - 'python/**'
      - '.github/workflows/build-container.yml'
      - '.github/workflows/build-unix.yml'
      - '.readthedocs.yaml'
    branches:
      - master
      - dev-branch

env:
  DEBUG: y
  BOOST: boost_1_85_0
  # GIT_SHA: GITHUB_SHA
  # GIT_HASH: ${GITHUB_SHA:0:7}
  ### GIT_HASH: $(git rev-parse --short $GITHUB_SHA)

jobs:
  release:
    name: "Create Release"
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Parse changelog
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=$(echo "${{ github.ref }}" | cut -f3 -d '/')
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo 'CHANGELOGENTRY<<EOF' >> $GITHUB_ENV
          ./tools/changelog.sh "$TAG" >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV
          case "$TAG" in
            *-rc*)
              echo "PRERELEASE=true" >> $GITHUB_ENV
              ;;
            *)
              echo "PRERELEASE=false" >> $GITHUB_ENV
              ;;
          esac
        id: changelogentry

      - name: Create release
        id: create_release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/create-release@v1.1.4
        # uses: ncipollo/release-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          allowUpdates: true
          name: Version ${{ github.ref_name }}
          body: ${{ env.CHANGELOGENTRY }}
          prerelease: ${{ env.PRERELEASE }}

      - name: Get OpenSoar Version
        id: get_version
        run: |
          echo "Get OpenSoar Version"
          echo "CurrDir = $(pwd)"
          ls -l .
          chmod +x ./ide/github/build.sh
          ./ide/github/build.sh
          ####    # include OpenSoar.config
          ####    # VERSION=$PROGRAM_VERSION
          ####    VERSION=7.43.22.1
          ####    # VERSION=$(cat VERSION.txt)
          ####    echo "$VERSION"
          ####    echo "VERSION=${VERSION}" >> $GITHUB_ENV
          ####    echo "GITHUB_SHA = $GITHUB_SHA"
          ####    echo "GIT_HASH = $GIT_HASH"
          ####    GIT_HASH=$(git rev-parse --short $GITHUB_SHA)
          ####    echo "GIT_HASH = $GIT_HASH"
          ####    GIT_HASH=${GITHUB_SHA:0:7}
          ####    echo "GIT_HASH = $GIT_HASH"
          ####    echo "PRERELEASE = $PRERELEASE"
          ####    echo "GITHUB_ENV = $GITHUB_ENV"
          ####    echo "PRERELEASE = ${{ env.PRERELEASE }}"
          ####    echo "git_hash=$(git rev-parse --short $GITHUB_SHA)" >> $GITHUB_ENV
          ####    echo "GIT_HASH=$GIT_HASH" >> $GITHUB_ENV
          ####    echo "git_hash = ${{ env.git_hash }}"
          ####    echo "git_hash = $git_hash"
          ####    if [ -z ${{ env.git_hash }} ]; then
          ####      echo "git_hash=$(git rev-parse --short --verify HEAD )" >> $GITHUB_ENV
          ####      echo "env.git_hash = '${{ env.git_hash }}'"
          ####    fi 
          ####    echo "GITHUB_ENV = $GITHUB_ENV"
          ####    echo "--------------------"
          ####    echo "cat $GITHUB_ENV"
          ####    cat $GITHUB_ENV
          ####    echo "--------------------"
          ####    echo "cat OpenSoar.config"
          ####    cat OpenSoar.config
          ####    echo "--------------------"

  build:
    runs-on: ${{ matrix.os }}
    needs: release
    container: ${{ matrix.target_container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: ANDROIDAARCH64
            target_bin: OpenSoar
            target_bin_path: bin
            target_final: OpenSoar
            target_ext: .apk
            target_test: true
            target_upload: true
            upload_artifact: false
            ndk: r26d
            target_container: debian:bookworm-slim
          
          - os: ubuntu-24.04
            target: ANDROID
            target_bin: OpenSoar
            target_bin_path: bin
            target_final: OpenSoar
            target_ext: .apk
            target_test: false
            target_upload: true
            upload_artifact: true
            ndk: r26d
            target_container: debian:bookworm-slim
# ------------------------------------------------------
